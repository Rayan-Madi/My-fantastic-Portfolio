<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" 
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style2contact.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="#">Contact</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="mesprojets.html">Mes Projets</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="hamburger" id="hamburger-icon">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>
    <div class="card">
        <div class="content">
            <h2>Un projet en tête ?</h2>            
            
            <form action="https://formspree.io/f/mzzevqwg" method="POST">
                <div class="form-group0">
                    <label for="name">Votre nom :</label>
                    <input type="text" id="name" name="name" required placeholder="Entrez votre nom">
                </div>
                
                <div class="form-group1">
                    <label for="email">Votre email :</label>
                    <input type="email" id="email" name="email" required placeholder="Entrez votre email">
                </div>
                
                <div class="form-group2">
                    <label for="subject">Sujet :</label>
                    <textarea id="subject" name="subject" rows="4" required placeholder="Décrivez moi votre projet !" class="form-input"></textarea>
                </div>                
                <div class="form-group3">
                    <button type="submit">Envoyer</button>
                </div>
            </form>
        </div>
    </div>
    
    <footer>
        <p class="copyright">&copy; Madi Rayan 2025 - Tous droits réservés</p>
    </footer>

    <script>
        // Sélection des éléments
        const hamburger = document.getElementById('hamburger-icon');
        const navLinks = document.querySelector('.nav-links');

        // Fonction pour basculer le menu
        function toggleMenu(event) {
            event.stopPropagation(); // Empêche la propagation de l'événement
            navLinks.classList.toggle('active');
            
            // Change l'icône hamburger en X quand le menu est ouvert
            const icon = hamburger.querySelector('i');
            if (navLinks.classList.contains('active')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        }

        // Ouvre/ferme le menu au clic sur l'icône
        hamburger.addEventListener('click', toggleMenu);

        // Ferme le menu quand on clique sur un lien
        const navItems = document.querySelectorAll('.nav-links a');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navLinks.classList.remove('active');
                
                // Remet l'icône hamburger
                const icon = hamburger.querySelector('i');
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            });
        });

        // Ferme le menu quand on clique en dehors
        document.addEventListener('click', (event) => {
            if (navLinks.classList.contains('active') && !event.target.closest('.navbar')) {
                navLinks.classList.remove('active');
                
                // Remet l'icône hamburger
                const icon = hamburger.querySelector('i');
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        });

        // Empêche la fermeture du menu lorsqu'on clique à l'intérieur
        navLinks.addEventListener('click', (event) => {
            event.stopPropagation();
        });
    </script>
    
</body>
</html>
